# Supabase CLI Local Configuration

[project]
id = "tio-monorepo"

[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320

[studio]
port = 54323

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/*", "io.supabase.tio://login-callback"]
jwt_expiry = 3600
enable_signup = true

[storage]
enabled = true
